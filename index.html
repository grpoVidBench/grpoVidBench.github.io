<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVidBench · Clinician Studies</title>
  <link rel="stylesheet" href="./styles.css?v=28" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <span class="brand">MedVidBench<span class="dot">.</span> <span class="muted" style="font-weight:500" id="tb-sub">clinician review</span></span>
      <span class="spacer"></span>
      <span class="meta" id="tb-tag">Surgical video reasoning</span>
    </div>
  </header>

  <main class="wrap narrow">
    <p class="eyebrow" id="pk-eyebrow">Review tasks</p>
    <h1 id="pk-h1">Choose a task to review</h1>
    <p class="lead" id="pk-lead">Pick a task to review its clips one at a time. Your progress is saved in this browser automatically, and you export your responses at the end.</p>

    <div id="login" class="login-card"></div>

    <div id="task-list" class="study-grid">
      <div class="center-load"><div class="spinner"></div><span id="pk-loading">Loading tasks…</span></div>
    </div>
    <div id="error" class="banner warn" style="display:none"></div>
  </main>

  <script src="./i18n.js?v=28"></script>
  <script>
    (function () {
      var I = window.I18N;
      var list = document.getElementById('task-list');
      var err = document.getElementById('error');
      var loginBox = document.getElementById('login');
      var tasks = null;   // [{ task, study_id, count }]

      // Reviewer identity, entered once here and shared with every task via the
      // same browser-wide key app.js reads. Mirrors i18n's storage convention.
      var REVIEWER_KEY = 'grpovidbench:reviewer';
      function getReviewer() {
        try { return (localStorage.getItem(REVIEWER_KEY) || '').trim(); } catch (e) { return ''; }
      }
      function setReviewer(v) {
        try {
          v = (v || '').trim();
          if (v) localStorage.setItem(REVIEWER_KEY, v); else localStorage.removeItem(REVIEWER_KEY);
        } catch (e) {}
      }

      function renderLogin() {
        loginBox.innerHTML = '';
        var id = getReviewer();
        if (id) {
          var line = document.createElement('div');
          line.className = 'login-signedin';
          var who = document.createElement('span');
          who.innerHTML = '<span class="muted"></span> <strong></strong>';
          who.querySelector('.muted').textContent = I.tr('Signed in as');
          who.querySelector('strong').textContent = id;
          var change = document.createElement('button');
          change.className = 'linklike';
          change.style.marginLeft = '10px';
          change.textContent = I.tr('change');
          change.addEventListener('click', function () {
            // If this name already has saved answers, make clear the work is kept
            // (parked under this name), not lost — switching just shows a fresh set.
            var saved = savedTaskCount(id);
            if (saved > 0 && !confirm(I.tf('You have answers saved as "{id}" for {n} task(s). They stay saved under that name — switching just shows a different reviewer. Switch now?', { id: id, n: saved }))) return;
            setReviewer(''); renderLogin(); renderTasks();
          });
          line.appendChild(who); line.appendChild(change);
          loginBox.appendChild(line);
          return;
        }
        var lab = document.createElement('label');
        lab.setAttribute('for', 'login-id');
        lab.textContent = I.tr('Your initials or email (for de-duplication)');
        var row = document.createElement('div');
        row.className = 'login-row';
        var input = document.createElement('input');
        input.type = 'text'; input.id = 'login-id'; input.autocomplete = 'off';
        input.placeholder = I.tr('e.g. SG or you@hospital.org');
        var save = document.createElement('button');
        save.className = 'btn btn-primary'; save.textContent = I.tr('Save');
        function commit() {
          var v = input.value.trim();
          if (!v) { input.focus(); return; }
          setReviewer(v); renderLogin(); renderTasks();
        }
        save.addEventListener('click', commit);
        input.addEventListener('keydown', function (e) { if (e.key === 'Enter') commit(); });
        var hint = document.createElement('p');
        hint.className = 'muted login-hint';
        hint.textContent = I.tr('Enter your initials or email to begin, then pick a task. It is saved in this browser and reused for every task.');
        row.appendChild(input); row.appendChild(save);
        loginBox.appendChild(lab); loginBox.appendChild(row); loginBox.appendChild(hint);
      }

      function applyStatic() {
        document.getElementById('tb-sub').textContent = I.tr('clinician review');
        document.getElementById('tb-tag').textContent = I.tr('Surgical video reasoning');
        document.getElementById('pk-eyebrow').textContent = I.tr('Review tasks');
        document.getElementById('pk-h1').textContent = I.tr('Choose a task to review');
        document.getElementById('pk-lead').textContent = I.tr('Pick a task to review its clips one at a time. Your progress is saved in this browser automatically, and you export your responses at the end.');
        var ld = document.getElementById('pk-loading');
        if (ld) ld.textContent = I.tr('Loading tasks…');
        document.title = (I.current && I.current() === 'zh') ? 'MedVidBench · 临床医生研究' : 'MedVidBench · Clinician Studies';
      }

      function renderTasks() {
        if (!tasks) return;
        list.innerHTML = '';
        if (!tasks.length) { list.innerHTML = '<p class="muted">—</p>'; return; }
        var loggedIn = !!getReviewer();
        list.classList.toggle('is-locked', !loggedIn);
        var reviewer = getReviewer();
        tasks.forEach(function (t) {
          var a = document.createElement('a');
          a.className = 'study-link';
          a.href = './study.html?study=' + encodeURIComponent(t.study_id) + '&task=' + encodeURIComponent(t.task);
          a.innerHTML =
            '<span class="study-num task-num"></span>' +
            '<span><span class="t"></span> <span class="s"></span></span>' +
            '<span class="status"></span>' +
            '<span class="arrow">→</span>';
          a.querySelector('.task-num').textContent = t.task;
          a.querySelector('.t').textContent = I.taskName(t.task);
          a.querySelector('.s').textContent = (t.count === 1) ? I.tr('1 clip') : I.tf('{n} clips', { n: t.count });

          // completion badge for the logged-in reviewer: done = check, partial = (d/t)
          var prog = taskProgress(t, reviewer);
          var statusEl = a.querySelector('.status');
          if (prog.done >= prog.total && prog.total > 0 && reviewer) {
            a.classList.add('is-done');
            statusEl.classList.add('badge', 'badge-done');
            statusEl.textContent = '✓ ' + I.tr('Done');
          } else if (prog.done > 0) {
            a.classList.add('is-partial');
            statusEl.classList.add('badge', 'badge-partial');
            statusEl.textContent = prog.done + ' / ' + prog.total;
          }

          // Until an ID is entered, steer the click to the login field instead of
          // navigating. (Deep links still work — app.js falls back to an inline field.)
          if (!loggedIn) {
            a.addEventListener('click', function (e) {
              e.preventDefault();
              var inp = document.getElementById('login-id');
              if (inp) { inp.focus(); inp.scrollIntoView({ block: 'center' }); }
            });
          }
          list.appendChild(a);
        });
      }

      // Build the task list by grouping every study's items by their "task" field.
      // We keep the items and the study's dimensions so the front page can compute
      // each task's completion straight from the saved state (see taskProgress).
      function buildTasks(studies) {
        return Promise.all(studies.map(function (s) {
          return fetch('./studies/' + s.study_id + '.json', { cache: 'no-store' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (cfg) { return cfg ? { study_id: s.study_id, items: cfg.items || [], dimensions: cfg.dimensions || [] } : null; })
            .catch(function () { return null; });
        })).then(function (loaded) {
          var order = [];
          var byTask = {};
          loaded.filter(Boolean).forEach(function (st) {
            st.items.forEach(function (it) {
              var tk = it.task || it.group || 'OTHER';
              if (!byTask[tk]) { byTask[tk] = { task: tk, study_id: st.study_id, count: 0, items: [], dimensions: st.dimensions }; order.push(byTask[tk]); }
              byTask[tk].count++;
              byTask[tk].items.push(it);
            });
          });
          return order;
        });
      }

      // ---- per-task progress, read from the same saved state app.js writes ----
      // Mirrors app.js itemComplete/dimVisible/dimRequired so the two never disagree.
      function dimVisible(dim, item) {
        if (!dim.requires_field) return true;
        var v = item[dim.requires_field];
        return !(v == null || (typeof v === 'string' && v.trim() === ''));
      }
      function dimRequired(dim) { return !dim.optional; }
      function itemComplete(item, dimensions, answers, skipped) {
        if (skipped && skipped[item.item_id]) return true;
        var ans = answers[item.item_id] || {};
        return dimensions.every(function (dim) {
          if (!dimVisible(dim, item) || !dimRequired(dim)) return true;
          var v = ans[dim.id];
          return v != null && String(v).trim() !== '';
        });
      }
      function taskProgress(t, reviewer) {
        var total = t.count, done = 0;
        if (reviewer) {
          var key = 'grpovidbench:' + t.study_id + ':' + t.task + ':' + reviewer;
          var st = null;
          try { var raw = localStorage.getItem(key); st = raw ? JSON.parse(raw) : null; } catch (e) {}
          if (st) {
            var answers = st.answers || {}, skipped = st.skipped || {};
            t.items.forEach(function (it) { if (itemComplete(it, t.dimensions, answers, skipped)) done++; });
          }
        }
        return { done: done, total: total };
      }
      // How many of the loaded tasks have any saved progress under this name —
      // used to confirm before "change" so a switch doesn't read as data loss.
      function savedTaskCount(reviewer) {
        if (!tasks || !reviewer) return 0;
        var n = 0;
        tasks.forEach(function (t) { if (taskProgress(t, reviewer).done > 0) n++; });
        return n;
      }

      I.mountToggle(document.querySelector('.topbar-inner'));
      I.onChange(function () { applyStatic(); renderLogin(); renderTasks(); });
      applyStatic();
      renderLogin();

      fetch('./studies/index.json', { cache: 'no-store' })
        .then(function (res) { if (!res.ok) throw new Error('index.json HTTP ' + res.status); return res.json(); })
        .then(function (studies) { return buildTasks(studies); })
        .then(function (t) { tasks = t; renderTasks(); })
        .catch(function (e) {
          list.innerHTML = '';
          err.style.display = 'block';
          err.textContent = 'Could not load studies — ' + e.message;
        });
    })();
  </script>
</body>
</html>
